<div class="admin-container">
  <h2 class="admin-title">Admin Panel</h2>

  <nav class="admin-nav">
    <button 
      [class.active]="currentTab === 'products'" 
      (click)="setTab('products')">Proizvodi</button>
    <button 
      [class.active]="currentTab === 'orders'" 
      (click)="setTab('orders')">Porudžbine</button>
    <button 
      [class.active]="currentTab === 'categories'" 
      (click)="setTab('categories')">Kategorije</button>
    <button 
      [class.active]="currentTab === 'manufacturers'" 
      (click)="setTab('manufacturers')">Proizvođači</button>
  </nav>

  <div *ngIf="!currentTab" class="admin-placeholder">
    <p>Odaberite sekciju iz menija da biste nastavili.</p>
  </div>

  <div class="admin-content" *ngIf="currentTab === 'products'">
    <app-admin-products></app-admin-products>
  </div>
  <div class="admin-content" *ngIf="currentTab === 'orders'">
    <app-admin-orders></app-admin-orders>
  </div>
  <div class="admin-content" *ngIf="currentTab === 'categories'">
    <app-admin-categories></app-admin-categories>
  </div>
  <div class="admin-content" *ngIf="currentTab === 'manufacturers'">
    <app-admin-manufacturers></app-admin-manufacturers>
  </div>
</div>
