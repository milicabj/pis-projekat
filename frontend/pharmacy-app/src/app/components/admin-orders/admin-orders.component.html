<h2>Porudžbine</h2>

<table>
  <thead>
    <tr>
      <th>Korisnik</th>
      <th>Proizvodi</th>
      <th>Ukupna cijena</th>
      <th>Status</th>
      <th>Datum</th>
      <th>Akcije</th>
    </tr>
  </thead>
  <tbody>
    <tr *ngFor="let order of orders">
      <td>{{ order.user?.email }}</td>
      <td>
        <ul>
          <li *ngFor="let item of order.items">
            <ng-container *ngIf="item.product; else obrisano">
              {{ item.product.name }} (x{{ item.quantity }}) – 
              {{ item.product.price * item.quantity | number:'1.2-2' }}€
            </ng-container>
            <ng-template #obrisano>
              <em style="color: gray;">Proizvod je obrisan</em>
            </ng-template>
          </li>
        </ul>
      </td>
      <td>{{ order.totalPrice | number:'1.2-2' }}€</td>
      <td>
        <select [(ngModel)]="order.status" 
        [ngClass]="order.status" 
        (change)="changeStatus(order, order.status)">

          <option *ngFor="let status of statuses" [value]="status">{{ status }}</option>
        </select>
      </td>
      <td>{{ order.createdAt | date:'short' }}</td>
      <td>
        <button (click)="deleteOrder(order._id)" >Obriši</button>
      </td>
    </tr>
  </tbody>
</table>
