name: CI/CD Pipeline

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  backend-check:
    name: Backend — Install & Smoke Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json

      - name: Install backend dependencies
        working-directory: backend
        run: npm install

      - name: Smoke test (syntax check)
        working-directory: backend
        run: node --check server.js

  frontend-build:
    name: Frontend — Install & Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/pharmacy-app/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend/pharmacy-app
        run: npm install

      - name: Build Angular (production)
        working-directory: frontend/pharmacy-app
        run: npm run build -- --configuration production

  docker-build:
    name: Docker — Build Images
    runs-on: ubuntu-latest
    needs: [backend-check, frontend-build]
    steps:
      - uses: actions/checkout@v4

      - name: Build backend Docker image
        run: docker build -t pharmacy-backend:${{ github.sha }} ./backend

      - name: Build frontend Docker image
        run: docker build -t pharmacy-frontend:${{ github.sha }} ./frontend/pharmacy-app
